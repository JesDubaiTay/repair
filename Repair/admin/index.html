<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Панель управления — РемонтТех</title>
  <link rel="stylesheet" href="admin-style.css">
</head>
<body>

  <!-- 1. ЭКРАН АВТОРИЗАЦИИ (Виден по умолчанию, если сессия не открыта) -->
  <div id="auth-screen" class="auth-container">
    <form class="auth-form" onsubmit="handleAdminLogin(event)">
      <div class="auth-logo">РемонтТех<span>.</span></div>
      <h2>Вход в админ-панель</h2>
      
      <div class="input-group">
        <label for="username">Логин</label>
        <input type="text" id="username" required placeholder="Введите логин">
      </div>
      
      <div class="input-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" required placeholder="Введите пароль">
      </div>
      
      <button type="submit" class="btn-login">Войти в систему</button>
    </form>
  </div>

  <!-- 2. ЭКРАН АДМИНКИ (По умолчанию скрыт через CSS) -->
  <div id="admin-screen" class="admin-dashboard">
    
    <!-- Шапка админки -->
    <header class="admin-header">
      <div class="admin-brand">Панель управления <span>РемонтТех</span></div>
      <div class="admin-user-box">
        <span>Мастер (Admin)</span>
        <button class="btn-logout" onclick="handleAdminLogout()">Выйти</button>
      </div>
    </header>

    <!-- Основной контент (Таблица заявок) -->
    <main class="admin-content">
      <div class="table-container">
        
        <div class="table-header">
          <h2>Список заявок на ремонт</h2>
          <span class="orders-count">Всего: 3 заявки</span>
        </div>
        
        <!-- Обновленная таблица с новыми колонками и атрибутами сортировки -->
        <table class="orders-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Дата / Время</th>
              <th>Источник</th>
              <th>Клиент</th>
              <th>Телефон</th>
              <!-- <th>Устройство</th> -->
              <th>Описание поломки</th>
              <th>Статус ремонта</th>
              <th>Заметка мастера</th>
            </tr>
          </thead>
          <tbody id="orders-table-body">
          </tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="admin-script.js"></script>
</body>
</html>
